<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>운명 리더기</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app">
    <!-- 상단바 -->
    <div class="topbar">
      <div class="logo"><span class="logo-mark"><svg viewBox="0 0 24 24" width="27" height="27" aria-hidden="true"><path d="M15.8 2.6a9.2 9.2 0 1 0 5.6 8.5 7.2 7.2 0 0 1-5.6-8.5z" fill="#D9B45B"/><path d="M18.7 13.4l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7z" fill="#F0D289"/></svg></span><span class="logo-txt"><span id="appName">운명 리더기</span><span id="appSlogan" class="slogan">당신의 운명을 읽다</span></span></div>
      <div class="spacer"></div>
      <div class="lang-tog" id="langTog" onclick="toggleLang()">EN</div>
      <div class="credit-badge"><span class="coin">C</span> <span id="creditNum">0</span> <span class="plus">＋</span></div>
    </div>

    <div id="view-home" class="view on"></div>
    <div id="view-reading" class="view"></div>

    <div id="view-archive" class="view">
      <div class="section" style="padding-top:20px">
        <div class="section-head"><h3>보관함</h3></div>
        <div class="card" style="text-align:center;color:var(--ink-3);padding:40px 18px">
          📂<br/>보관한 결과가 없어요.<br/><span class="muted">본 결과는 여기 저장돼 다시 볼 수 있어요.</span>
        </div>
      </div>
    </div>

    <div id="view-me" class="view">
      <div class="section" style="padding-top:20px">
        <div class="section-head"><h3>내 정보</h3></div>
        <div class="card">로그인 · 프로필 · 크레딧 (준비 중)</div>
      </div>
    </div>

    <div id="view-deep" class="view"></div>
    <div id="view-extra" class="view"></div>

    <div class="bottom-nav" id="bottomNav"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="data/hanja.js"></script>
  <script src="data/dream.js"></script>
  <script src="js/hangul.js"></script>
  <script src="js/saju.js"></script>
  <script src="js/sugri.js"></script>
  <script src="js/eumohaeng.js"></script>
  <script src="js/naming.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
