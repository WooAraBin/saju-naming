<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사주 작명 — 이름 점수 분석</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>🪔 사주 작명</h1>
    <p class="sub">생년월일시 사주를 분석해, 이름을 6가지 항목으로 채점합니다</p>
  </header>

  <main>
    <!-- 입력 -->
    <section class="card" id="form-card">
      <h2>출생 정보</h2>
      <div class="grid">
        <label>성(姓)
          <input id="seong" type="text" maxlength="1" placeholder="예: 김" />
        </label>
        <label>성별
          <select id="gender">
            <option value="M">남</option>
            <option value="F">여</option>
          </select>
        </label>
        <label>생년월일 (양력)
          <input id="birthdate" type="date" value="2024-01-01" />
        </label>
        <label>출생 시각
          <input id="birthtime" type="time" value="12:00" />
        </label>
      </div>
      <div class="row">
        <label class="chk">
          <input id="useLocal" type="checkbox" checked />
          지방시(진태양시) 보정 사용
        </label>
        <label>출생지 경도
          <input id="lon" type="number" step="0.01" value="127.0" style="width:90px" />
        </label>
      </div>
      <div class="row">
        <button id="analyze" class="primary">사주 분석 + 이름 추천</button>
        <span id="dataStatus" class="muted"></span>
      </div>
    </section>

    <!-- 사주 결과 -->
    <section class="card hidden" id="saju-card">
      <h2>사주 분석</h2>
      <div id="pillars" class="pillars"></div>
      <div id="wxdist" class="wxdist"></div>
      <p id="yongsin-text" class="yongsin"></p>
    </section>

    <!-- 추천 이름 + 육각형 -->
    <section class="card hidden" id="result-card">
      <h2>추천 이름</h2>
      <div class="result-layout">
        <ol id="name-list" class="name-list"></ol>
        <div class="hex-wrap">
          <div id="hex-title" class="hex-title"></div>
          <canvas id="radar" width="320" height="320"></canvas>
          <div id="hex-detail" class="hex-detail"></div>
        </div>
      </div>
    </section>

    <!-- 내 이름 점수 (한글 자모 획수 기반) -->
    <section class="card" id="myname-card">
      <h2>📊 내 이름 점수</h2>
      <p class="sub" style="margin:0 0 10px">한글 이름을 한글 자모 획수·발음오행으로 채점합니다 (한자 없이 가능).</p>
      <div class="grid">
        <label>성<input id="mnSeong" type="text" maxlength="1" placeholder="예: 김" /></label>
        <label>이름<input id="mnName" type="text" maxlength="4" placeholder="예: 서연" /></label>
      </div>
      <div class="row">
        <button id="mnBtn" class="primary">내 이름 채점</button>
      </div>
      <div id="mnResult" class="hidden">
        <div class="hex-wrap">
          <div id="mn-title" class="hex-title"></div>
          <canvas id="mnRadar" width="320" height="320"></canvas>
          <div id="mn-detail" class="hex-detail"></div>
        </div>
        <div id="mn-ai" class="yongsin" style="margin-top:12px;white-space:pre-wrap"></div>
      </div>
    </section>
  </main>

  <footer>
    <p class="disclaimer">
      ※ 작명 로직은 유파별 차이가 있으며, 본 결과는 통용 성명학(억부용신·발음/자원오행·81수리)에
      기반한 참고용입니다.
    </p>
  </footer>

  <!-- 라이브러리 -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- 앱 모듈 -->
  <script src="data/hanja.js"></script>
  <script src="js/hangul.js"></script>
  <script src="js/saju.js"></script>
  <script src="js/sugri.js"></script>
  <script src="js/eumohaeng.js"></script>
  <script src="js/naming.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
